<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>数据透视与汇总</title>
    <style>
        body {
            font-family: "Microsoft YaHei";
            margin: 0;
            padding: 10px;
            background-color: #f5f5f5;
            color: #333;
            font-size: 12px;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .section {
            background: white;
            padding: 8px 10px;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #444;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .floor-container {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .floor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 4px;
            border-bottom: 1px dashed #eee;
        }

        .floor-item:hover {
            background-color: #e3f2fd;
        }

        .floor-name {
            flex: 1;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
        }

        input[type="checkbox"] {
            margin: 0 6px 0 0;
            cursor: pointer;
        }

        .opt-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lbl-mult {
            font-size: 11px;
            color: #666;
        }

        .sel-mult {
            width: 36px;
            padding: 2px;
            font-size: 11px;
            border: 1px solid #ccc;
            border-radius: 3px;
            outline: none;
            text-align: center;
        }

        .sel-formwork {
            width: 55px;
            padding: 2px;
            font-size: 11px;
            border: 1px solid #ccc;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .mode-selector {
            display: flex;
            justify-content: space-between;
            background: #eef2f5;
            padding: 8px 10px;
            border-radius: 4px;
            border: 1px solid #dcdcdc;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .mode-selector label {
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            font-weight: bold;
            color: #0056b3;
        }

        .mode-selector input[type="radio"] {
            margin: 0;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: 10px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: white;
        }

        .btn-exec {
            background-color: #28a745;
        }

        .btn-exec:hover {
            background-color: #218838;
        }

        .status {
            margin-top: 6px;
            font-size: 11px;
            color: #666;
            text-align: center;
            flex-shrink: 0;
        }

        .link-btn {
            color: #007bff;
            cursor: pointer;
            text-decoration: underline;
            font-weight: normal;
        }
    </style>
</head>

<body>

    <div class="section">
        <div class="title">
            <span>📌 请勾选楼层并设置相同层数</span>
            <span class="link-btn" onclick="toggleSelectAll()">全选/反选</span>
        </div>
        <div class="floor-container" id="floorList">
            <div style="color:#999; text-align:center; padding: 10px;">正在扫描表格数据...</div>
        </div>
    </div>

    <div class="mode-selector">
        <label title="最精细：自动按左侧所有文本进行分组"><input type="radio" name="mergeMode" value="mode1" checked> 墙材质分开计算</label>
        <label title="预留模式扩展"><input type="radio" name="mergeMode" value="mode2" disabled> 预留模式</label>
    </div>

    <div class="btn-group">
        <button class="btn btn-exec" onclick="generatePivot()">立即执行数据透视表</button>
    </div>

    <div class="status" id="statusMsg">提示：自动剔除尾部空列，带公式汇总及标准工程排版。</div>

    <script>
        let rawData = [];
        let firstNumRow = -1;
        let firstNumCol = -1;
        let floorCol = 0; 
        let nameCol = -1; 
        let lastValidCol = -1; 

        window.onload = function () { loadFloors(); };

        function getColumnLetter(colIndex) {
            let temp, letter = '';
            while (colIndex > 0) {
                temp = (colIndex - 1) % 26;
                letter = String.fromCharCode(temp + 65) + letter;
                colIndex = (colIndex - temp - 1) / 26;
            }
            return letter;
        }

        function loadFloors() {
            const app = wps.Application;
            const sheet = app.ActiveSheet;

            if (!sheet || !sheet.UsedRange) {
                document.getElementById("floorList").innerHTML = "表格为空！";
                return;
            }

            rawData = sheet.UsedRange.Value2;
            if (!rawData) return;
            if (!Array.isArray(rawData)) rawData = [[rawData]];

            firstNumRow = -1;
            firstNumCol = -1;
            for (let r = 0; r < rawData.length; r++) {
                for (let c = 0; c < rawData[r].length; c++) {
                    let val = rawData[r][c];
                    if (val !== null && val !== "") {
                        let cleanVal = String(val).trim();
                        if (cleanVal !== '' && !isNaN(cleanVal)) {
                            firstNumRow = r;
                            firstNumCol = c;
                            break;
                        }
                    }
                }
                if (firstNumRow !== -1) break;
            }

            if (firstNumRow === -1) {
                document.getElementById("floorList").innerHTML = "<div style='padding:10px; color:red;'>未检测到数字列，无法透视！</div>";
                return;
            }

            let headerRow = firstNumRow > 0 ? firstNumRow - 1 : 0;
            
            for (let c = 0; c < firstNumCol; c++) {
                let text = String(rawData[headerRow][c] || "").replace(/\s/g, '');
                if (text.indexOf("楼层") !== -1) floorCol = c;
                if (text.indexOf("名称") !== -1) nameCol = c;
            }

            lastValidCol = firstNumCol;
            for (let c = firstNumCol; c < rawData[headerRow].length; c++) {
                let hText = String(rawData[headerRow][c] || "").trim();
                let dText = String(rawData[firstNumRow][c] || "").trim();
                if (hText !== "" || dText !== "") {
                    lastValidCol = c;
                }
            }

            let floorSet = new Set();
            let currentFloor = "";

            for (let i = firstNumRow; i < rawData.length; i++) {
                let row = rawData[i];
                let floorVal = row[floorCol];

                if (floorVal !== null && floorVal !== undefined && String(floorVal).trim() !== "") {
                    let fStr = String(floorVal).trim();
                    if (fStr.indexOf("小计") === -1 && fStr.indexOf("合计") === -1 && fStr.indexOf("透视") === -1) {
                        currentFloor = fStr;
                    } else {
                        currentFloor = "";
                    }
                }

                let isSubtotal = false;
                for(let c = 0; c < firstNumCol; c++) {
                    let strVal = String(row[c] || "").trim();
                    if(strVal.indexOf("合计") !== -1 || strVal.indexOf("小计") !== -1) {
                        isSubtotal = true; break;
                    }
                }

                if (currentFloor !== "" && !isSubtotal) {
                    floorSet.add(currentFloor);
                }
            }

            let listDiv = document.getElementById("floorList");
            listDiv.innerHTML = "";
            if (floorSet.size === 0) {
                listDiv.innerHTML = "<div style='padding:10px; color:#666;'>未提取到有效楼层！</div>";
                return;
            }

            floorSet.forEach(floor => {
                let html = `
                    <div class="floor-item">
                        <label class="floor-name"><input type="checkbox" class="chk-floor" value="${floor}" checked> ${floor}</label>
                        <div class="opt-group">
                            <span class="lbl-mult">相同层数:</span>
                            <input type="number" class="sel-mult" value="1" min="1">
                            <select class="sel-formwork">
                                <option value="木模" selected>木模</option>
                                <option value="铝模">铝模</option>
                            </select>
                        </div>
                    </div>
                `;
                listDiv.insertAdjacentHTML('beforeend', html);
            });
        }

        function toggleSelectAll() {
            let chks = document.querySelectorAll('.chk-floor');
            if (chks.length === 0) return;
            let allChecked = Array.from(chks).every(c => c.checked);
            chks.forEach(c => c.checked = !allChecked);
        }

        function generatePivot() {
            let floorConfigs = {};
            document.querySelectorAll('.floor-item').forEach(item => {
                let chk = item.querySelector('.chk-floor');
                if (chk && chk.checked) {
                    let fname = chk.value;
                    let mult = parseFloat(item.querySelector('.sel-mult').value) || 1;
                    let formwork = item.querySelector('.sel-formwork').value;
                    floorConfigs[fname] = { mult: mult, formwork: formwork };
                }
            });

            if (Object.keys(floorConfigs).length === 0) {
                alert("请至少勾选一个楼层！");
                return;
            }

            let summary = {};
            let currentFloor = "";
            let numColsCount = lastValidCol - firstNumCol + 1; 
            
            const app = wps.Application;
            let sheetNameSafe = "'" + app.ActiveSheet.Name + "'";

            for (let i = firstNumRow; i < rawData.length; i++) {
                let row = rawData[i];
                let fVal = row[floorCol];
                
                if (fVal !== null && fVal !== undefined && String(fVal).trim() !== "") {
                    let fStr = String(fVal).trim();
                    if (fStr.indexOf("小计") === -1 && fStr.indexOf("合计") === -1) {
                        currentFloor = fStr;
                    } else {
                        currentFloor = "";
                    }
                }

                if (!currentFloor || !floorConfigs[currentFloor]) continue; 

                let isSubtotal = false;
                let isEmpty = true;
                for(let c = 0; c < firstNumCol; c++) {
                    let strVal = String(row[c] || "").trim();
                    if(strVal !== "") isEmpty = false;
                    if(strVal.indexOf("合计") !== -1 || strVal.indexOf("小计") !== -1) {
                        isSubtotal = true; break;
                    }
                }
                if (isSubtotal || isEmpty) continue;

                let config = floorConfigs[currentFloor];
                let mult = config.mult;
                let formwork = config.formwork;

                let groupValues = [];
                for(let c = 0; c < firstNumCol; c++) {
                    groupValues.push(String(row[c] || "").trim());
                }
                
                let key = groupValues.join("_|_") + "_|_" + formwork;

                if (!summary[key]) {
                    summary[key] = { 
                        labels: groupValues,
                        formwork: formwork,
                        mult: mult,
                        refs: Array.from({length: numColsCount}, () => []), 
                        sums: new Array(numColsCount).fill(0) 
                    };
                }

                for(let c = firstNumCol; c <= lastValidCol; c++) {
                    let qty = parseFloat(row[c]);
                    if (isNaN(qty)) qty = 0;
                    summary[key].sums[c - firstNumCol] += qty;
                    
                    let cellAddr = sheetNameSafe + "!" + getColumnLetter(c + 1) + (i + 1);
                    summary[key].refs[c - firstNumCol].push(cellAddr);
                }
            }

            let headerRowIdx = firstNumRow > 0 ? firstNumRow - 1 : 0;
            let originalHeaders = rawData[headerRowIdx] || [];
            let safeNameCol = nameCol !== -1 ? nameCol : (firstNumCol > 0 ? firstNumCol - 1 : 0);
            
            let headers = [];
            for(let c = 0; c < safeNameCol; c++) headers.push(originalHeaders[c] || `分类${c+1}`);
            headers.push("保温");
            headers.push("工艺");
            for(let c = safeNameCol; c < firstNumCol; c++) headers.push(originalHeaders[c] || `分类${c+1}`);
            
            for(let c = firstNumCol; c <= lastValidCol; c++) headers.push(originalHeaders[c] || `数据${c-firstNumCol+1}`);

            let outArr = [headers];

            for (let k in summary) {
                let item = summary[k];
                let outRow = outArr.length + 1; 
                
                let rowData = [];
                for(let c = 0; c < safeNameCol; c++) rowData.push(item.labels[c]);
                
                let newNameColIdx = safeNameCol + 2; 
                let nameCell = getColumnLetter(newNameColIdx + 1) + outRow; 
                rowData.push(`=IF(ISNUMBER(FIND("保温",${nameCell})),"保温","")`);
                rowData.push(item.formwork);
                
                for(let c = safeNameCol; c < firstNumCol; c++) rowData.push(item.labels[c]);
                
                for(let c = 0; c < item.refs.length; c++) {
                    let refs = item.refs[c];
                    if (refs.length > 0) {
                        let formula = "=(" + refs.join("+") + ")";
                        if (item.mult !== 1) formula += "*" + item.mult;
                        
                        if (formula.length > 8000) {
                            formula = item.sums[c] * item.mult;
                        }
                        rowData.push(formula);
                    } else {
                        rowData.push(0);
                    }
                }
                outArr.push(rowData);
            }

            if (outArr.length <= 1) {
                alert("没有提取到符合条件的工程量数据！");
                return;
            }

            // ==========================================
            // 生成表格并执行【高级排版】
            // ==========================================
            app.ScreenUpdating = false;
            let newSheet = app.Worksheets.Add();
            newSheet.Name = "带公式透视_" + Math.floor(Math.random() * 1000);
            
            let targetRange = newSheet.Range(newSheet.Cells.Item(1, 1), newSheet.Cells.Item(outArr.length, outArr[0].length));
            targetRange.Formula = outArr; 
            
            // 🌟 1. 基础样式与尺寸
            targetRange.Columns.ColumnWidth = 7;
            newSheet.Rows.Item("1:1").RowHeight = 55;
            if (outArr.length > 1) {
                newSheet.Rows.Item("2:" + outArr.length).RowHeight = 16;
            }

            // 🌟 2. 核心：水平居中、垂直居中、自动换行
            targetRange.HorizontalAlignment = -4108; // 水平居中
            targetRange.VerticalAlignment = -4108;   // 垂直居中
            targetRange.WrapText = true;             // 自动换行

            let headerRange = newSheet.Range(newSheet.Cells.Item(1, 1), newSheet.Cells.Item(1, outArr[0].length));
            headerRange.Interior.Color = 14277081; 
            headerRange.Font.Bold = true;
            
            // 🌟 3. 激活首行自动筛选
            newSheet.Activate();
            app.ActiveWindow.ScrollRow = 1;
            app.ActiveWindow.ScrollColumn = 1;
            newSheet.AutoFilterMode = false;
            newSheet.Rows.Item("1:1").AutoFilter();

            // 🌟 4. 定位锚点冻结
            let freezeCol = headers.length - numColsCount + 1;
            app.ActiveWindow.FreezePanes = false;
            newSheet.Cells.Item(2, freezeCol).Select();
            app.ActiveWindow.FreezePanes = true;

            app.ScreenUpdating = true;
            window.close();
        }
    </script>
</body>

</html>
