<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>数据透视与汇总</title>
    <style>
        /* 🚨 核心排版大改：采用 Flex 弹性布局，消灭双滚动条，全局防框选 */
        body {
            font-family: "Microsoft YaHei";
            margin: 0;
            padding: 10px;
            background-color: #f5f5f5;
            color: #333;
            font-size: 12px;
            user-select: none;
            -webkit-user-select: none;
            /* 防框选 */
            overflow: hidden;
            /* 彻底干掉外层双滚动条 */
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            /* Flex满屏布局 */
        }

        .section {
            background: white;
            padding: 8px 10px;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            /* 自动占据剩下的所有垂直空间 */
        }

        .title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #444;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
            /* 标题不被压缩 */
        }

        .floor-container {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            /* 内部自动滚动！ */
        }

        .floor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 4px;
            border-bottom: 1px dashed #eee;
        }

        .floor-item:hover {
            background-color: #e3f2fd;
        }

        .floor-name {
            flex: 1;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
        }

        input[type="checkbox"] {
            margin: 0 6px 0 0;
            cursor: pointer;
        }

        .opt-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lbl-mult {
            font-size: 11px;
            color: #666;
        }

        .sel-mult {
            width: 36px;
            padding: 2px;
            font-size: 11px;
            border: 1px solid #ccc;
            border-radius: 3px;
            outline: none;
            text-align: center;
        }

        .sel-formwork {
            width: 55px;
            padding: 2px;
            font-size: 11px;
            border: 1px solid #ccc;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        /* 👇 底部这些全部设为 flex-shrink: 0，确保它们被死死钉在底部，永不被挤扁 */
        .mode-selector {
            display: flex;
            justify-content: space-between;
            background: #eef2f5;
            padding: 8px 10px;
            border-radius: 4px;
            border: 1px solid #dcdcdc;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .mode-selector label {
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            font-weight: bold;
            color: #0056b3;
        }

        .mode-selector input[type="radio"] {
            margin: 0;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: 10px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: white;
        }

        .btn-exec {
            background-color: #28a745;
        }

        .btn-exec:hover {
            background-color: #218838;
        }

        .status {
            margin-top: 6px;
            font-size: 11px;
            color: #666;
            text-align: center;
            flex-shrink: 0;
        }

        .link-btn {
            color: #007bff;
            cursor: pointer;
            text-decoration: underline;
            font-weight: normal;
        }
    </style>
</head>

<body>

    <div class="section">
        <div class="title">
            <span>📌 请勾选楼层并设置相同层数</span>
            <span class="link-btn" onclick="toggleSelectAll()">全选/反选</span>
        </div>
        <div class="floor-container" id="floorList">
            <div style="color:#999; text-align:center; padding: 10px;">正在扫描表格数据...</div>
        </div>
    </div>

    <div class="mode-selector">
        <label title="最精细：同楼层+同材质 才合并"><input type="radio" name="mergeMode" value="mode1" checked> 墙材质分开计算</label>
        <label title="中等：同楼层内无视材质强制合并"><input type="radio" name="mergeMode" value="mode2"> 墙材质合并计算</label>
        <label title="最粗放：跨楼层同材质强制合并"><input type="radio" name="mergeMode" value="mode3"> 楼层合并计算</label>
    </div>

    <div class="btn-group">
        <button class="btn btn-exec" onclick="generatePivot()">🚀 生成高级数据透视表</button>
    </div>

    <div class="status" id="statusMsg">提示：工艺不同永远不会被合并，保证计价精准。</div>

    <script>
        let rawData = [];
        let headerRows = 2;

        window.onload = function () { loadFloors(); };

        function loadFloors() {
            const app = wps.Application;
            const sheet = app.ActiveSheet;

            if (!sheet || !sheet.UsedRange) {
                document.getElementById("floorList").innerHTML = "表格为空！";
                return;
            }

            rawData = sheet.UsedRange.Value2;
            if (!rawData || rawData.length <= headerRows) return;

            let floorSet = new Set();
            let currentFloor = "";

            for (let i = headerRows; i < rawData.length; i++) {
                let row = rawData[i];
                let floorVal = row[0];
                let nameVal = row[1];
                let materialVal = row[2];

                if (floorVal !== null && floorVal !== undefined && String(floorVal).trim() !== "") {
                    let fStr = String(floorVal).trim();
                    if (fStr.indexOf("总计") === -1 && fStr.indexOf("合计") === -1 && fStr.indexOf("透视") === -1) {
                        currentFloor = fStr;
                    } else {
                        currentFloor = "";
                    }
                }

                let isSubtotal = (String(nameVal).indexOf("合计") !== -1) || (String(nameVal).indexOf("小计") !== -1) ||
                    (String(materialVal).indexOf("合计") !== -1) || (String(materialVal).indexOf("小计") !== -1);

                if (currentFloor !== "" && !isSubtotal) {
                    floorSet.add(currentFloor);
                }
            }

            let listDiv = document.getElementById("floorList");
            listDiv.innerHTML = "";
            if (floorSet.size === 0) return;

            floorSet.forEach(floor => {
                let html = `
                    <div class="floor-item">
                        <label class="floor-name"><input type="checkbox" class="chk-floor" value="${floor}" checked> ${floor}</label>
                        <div class="opt-group">
                            <span class="lbl-mult">相同层数:</span>
                            <input type="number" class="sel-mult" value="1" min="1">
                            <select class="sel-formwork">
                                <option value="木模" selected>木模</option>
                                <option value="铝模">铝模</option>
                            </select>
                        </div>
                    </div>
                `;
                listDiv.insertAdjacentHTML('beforeend', html);
            });
            document.getElementById("statusMsg").innerText = `共发现 ${floorSet.size} 个楼层，请配置层数与工艺。`;
        }

        function toggleSelectAll() {
            let chks = document.querySelectorAll('.chk-floor');
            if (chks.length === 0) return;
            let allChecked = Array.from(chks).every(c => c.checked);
            chks.forEach(c => c.checked = !allChecked);
        }

        function getColumnLetter(colIndex) {
            let temp, letter = '';
            while (colIndex > 0) {
                temp = (colIndex - 1) % 26;
                letter = String.fromCharCode(temp + 65) + letter;
                colIndex = (colIndex - temp - 1) / 26;
            }
            return letter;
        }

        function generatePivot() {
            const app = wps.Application;
            const sheet = app.ActiveSheet;

            let hasHidden = false;
            try {
                if (sheet.FilterMode) hasHidden = true;
                let rHidden = sheet.UsedRange.Rows.Hidden;
                let cHidden = sheet.UsedRange.Columns.Hidden;
                if (rHidden === null || rHidden === true) hasHidden = true;
                if (cHidden === null || cHidden === true) hasHidden = true;
            } catch (e) { }

            if (hasHidden) {
                let msg = "⚠️ 警告：检测到当前表格存在【筛选】或【隐藏】的行列！\n\n" +
                    "底层引擎扫描会无视隐藏，强制抓取所有数据进行汇总，这会导致汇总结果与你肉眼看到的不一致！\n\n" +
                    "【强烈建议】：点击“取消”，回到表格清除筛选和隐藏后再来生成。\n\n" +
                    "你确定要强行继续汇总吗？";
                if (!confirm(msg)) return;
            }

            let checkedFloors = [];
            let formworkMap = {};
            let multMap = {};

            document.querySelectorAll('.chk-floor:checked').forEach(cb => {
                let fName = cb.value;
                checkedFloors.push(fName);

                let parentDiv = cb.closest('.floor-item');
                let selFw = parentDiv.querySelector('.sel-formwork');
                if (selFw) formworkMap[fName] = selFw.value;

                let inputMult = parentDiv.querySelector('.sel-mult');
                let multVal = parseInt(inputMult.value);
                multMap[fName] = (!isNaN(multVal) && multVal > 0) ? multVal : 1;
            });

            if (checkedFloors.length === 0) { alert("请选择楼层！"); return; }

            let mergeMode = document.querySelector('input[name="mergeMode"]:checked').value;

            let startRow = sheet.UsedRange.Row;
            let startCol = sheet.UsedRange.Column;
            let safeOrigName = "'" + sheet.Name + "'";

            let grouped = new Map();
            let currentA = "", currentB = "", currentC = "";

            for (let i = headerRows; i < rawData.length; i++) {
                let row = rawData[i];
                let valA = row[0];
                let valB = row[1];
                let valC = row[2];

                if (valA !== null && valA !== undefined && String(valA).trim() !== "") currentA = String(valA).trim();
                if (valB !== null && valB !== undefined && String(valB).trim() !== "") currentB = String(valB).trim();
                if (valC !== null && valC !== undefined && String(valC).trim() !== "") currentC = String(valC).trim();

                let isSubtotal = (String(valB).indexOf("合计") !== -1) || (String(valB).indexOf("小计") !== -1) ||
                    (String(valC).indexOf("合计") !== -1) || (String(valC).indexOf("小计") !== -1);

                if (!isSubtotal && checkedFloors.includes(currentA)) {
                    let cleanB = currentB.replace(/\[.*?\]/g, '').replace(/【.*?】/g, '').replace(/［.*?］/g, '').trim();
                    let floorFormwork = formworkMap[currentA] || "未指定";

                    let key = "";
                    let displayFloor = currentA;
                    let displayMaterial = currentC;

                    if (mergeMode === "mode1") {
                        key = currentA + "|||" + cleanB + "|||" + currentC + "|||" + floorFormwork;
                    }
                    else if (mergeMode === "mode2") {
                        key = currentA + "|||" + cleanB + "|||MERGED_MAT|||" + floorFormwork;
                        displayMaterial = "多材质合并";
                    }
                    else if (mergeMode === "mode3") {
                        key = "MERGED_FLR|||" + cleanB + "|||" + currentC + "|||" + floorFormwork;
                        displayFloor = "多楼层合并";
                    }

                    if (!grouped.has(key)) {
                        grouped.set(key, {
                            floor: displayFloor,
                            name: cleanB,
                            material: displayMaterial,
                            formwork: floorFormwork,
                            isBaowen: false,
                            items: []
                        });
                    }

                    let g = grouped.get(key);
                    g.items.push({ rIdx: startRow + i, mult: multMap[currentA] });

                    if (currentB.indexOf("保温") !== -1) {
                        g.isBaowen = true;
                    }
                }
            }

            let resultData = [];

            for (let [key, group] of grouped) {
                let newRow = new Array(rawData[0].length + 2).fill("");

                newRow[0] = group.floor;
                newRow[1] = group.isBaowen ? "保温" : "";
                newRow[2] = group.formwork !== "未指定" ? group.formwork : "";
                newRow[3] = group.name;
                newRow[4] = group.material;

                for (let c = 3; c < rawData[0].length; c++) {
                    let colLetter = getColumnLetter(startCol + c);
                    let formulaParts = [];

                    for (let item of group.items) {
                        let cellVal = Number(rawData[item.rIdx - startRow][c]);
                        if (!isNaN(cellVal) && cellVal !== 0) {
                            if (item.mult > 1) {
                                formulaParts.push(safeOrigName + "!" + colLetter + item.rIdx + "*" + item.mult);
                            } else {
                                formulaParts.push(safeOrigName + "!" + colLetter + item.rIdx);
                            }
                        }
                    }

                    if (formulaParts.length > 0) {
                        newRow[c + 2] = "=" + formulaParts.join("+");
                    } else {
                        newRow[c + 2] = 0;
                    }
                }
                resultData.push(newRow);
            }

            let totalRow = new Array(rawData[0].length + 2).fill("");
            totalRow[0] = "透视总计";
            totalRow[3] = `共处理 ${checkedFloors.length} 个楼层`;

            let lastDataRowIdx = headerRows + resultData.length + 1;

            for (let c = 3; c < rawData[0].length; c++) {
                let sumColLetter = getColumnLetter(startCol + c + 2);
                totalRow[c + 2] = `=SUM(${sumColLetter}${headerRows + 1}:${sumColLetter}${lastDataRowIdx - 1})`;
            }
            resultData.push(totalRow);

            try {
                let newSheet = app.Worksheets.Add();
                newSheet.Name = "算量透视_" + Math.floor(Math.random() * 1000);

                sheet.Range("1:" + headerRows).Copy(newSheet.Range("A1"));
                newSheet.Range("B:C").EntireColumn.Insert();

                newSheet.Range("B" + headerRows).Value2 = "保温";
                newSheet.Range("C" + headerRows).Value2 = "模板工艺";

                let dataStartRow = headerRows + 1;
                let targetRange = newSheet.Range("A" + dataStartRow).Resize(resultData.length, rawData[0].length + 2);
                targetRange.Formula = resultData;

                let fullRange = newSheet.UsedRange;
                fullRange.Font.Name = "宋体";
                fullRange.Font.Size = 9;
                fullRange.Interior.ColorIndex = 0;
                fullRange.HorizontalAlignment = -4108;
                fullRange.VerticalAlignment = -4108;
                fullRange.WrapText = true;
                fullRange.Borders.LineStyle = 1;
                fullRange.Borders.Weight = 2;

                newSheet.Range("2:2").AutoFilter();

                let lastRowStr = lastDataRowIdx + ":" + lastDataRowIdx;
                newSheet.Range(lastRowStr).Font.Bold = true;

                newSheet.Range("2:2").RowHeight = 59;
                newSheet.Range("3:" + lastDataRowIdx).RowHeight = 13;

                let endColLetter = getColumnLetter(rawData[0].length + 2);
                newSheet.Range("D:" + endColLetter).ColumnWidth = 9;
                newSheet.Range("B:C").ColumnWidth = 7;
                newSheet.Range("A:A").EntireColumn.AutoFit();

                alert("🎉 高级透视生成完毕！");
            } catch (e) {
                alert("生成失败，错误信息：" + e.message);
            }
        }
    </script>
</body>

</html>
