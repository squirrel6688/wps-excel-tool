<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>格式清洗</title>
    <style>
        /* 极致紧凑排版 */
        body { font-family: "Microsoft YaHei"; margin: 0; padding: 8px; background-color: #f5f5f5; color: #333; font-size: 12px; }
        .section { background: white; padding: 8px 10px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); margin-bottom: 8px; }
        .title { font-weight: bold; margin-bottom: 6px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 4px; font-size: 12px; }
        
        /* 复选框紧凑布局 */
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px 10px; }
        .checkbox-group label { display: flex; align-items: center; cursor: pointer; width: 45%; font-size: 11px; }
        
        /* 单选框紧凑布局 */
        .radio-group { display: flex; gap: 15px; margin-top: 2px;}
        .radio-group label { display: flex; align-items: center; cursor: pointer; color: #d32f2f; font-weight: bold; font-size: 11px;}
        
        input[type="checkbox"], input[type="radio"] { margin: 0 4px 0 0; cursor: pointer; }

        /* 按钮紧凑布局 */
        .btn-group { display: flex; justify-content: space-between; gap: 8px; margin-top: 8px; }
        .btn { flex: 1; padding: 5px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-save { background-color: #6c757d; color: white; }
        .btn-save:hover { background-color: #5a6268; }
        .btn-exec { background-color: #007bff; color: white; }
        .btn-exec:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="section">
        <div class="title">1. 清洗内容</div>
        <div class="checkbox-group">
            <label><input type="checkbox" id="chkColor"> 去除底色</label>
            <label><input type="checkbox" id="chkWrap"> 自动换行(开启)</label>
            <label><input type="checkbox" id="chkHCenter"> 水平居中</label>
            <label><input type="checkbox" id="chkVCenter"> 垂直居中</label>
        </div>
    </div>

    <div class="section">
        <div class="title">2. 作用范围</div>
        <div class="radio-group">
            <label><input type="radio" name="scope" id="scopeSheet" value="sheet" checked> 当前工作表</label>
            <label><input type="radio" name="scope" id="scopeAll" value="all"> 所有工作表</label>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-save" onclick="saveSettings()">💾 保存配置</button>
        <button class="btn btn-exec" onclick="executeFormat()">🚀 执行清洗</button>
    </div>

    <script>
        window.onload = function() {
            if (localStorage.getItem("fmt_chkColor") !== null) {
                document.getElementById("chkColor").checked = localStorage.getItem("fmt_chkColor") === "true";
                document.getElementById("chkWrap").checked = localStorage.getItem("fmt_chkWrap") === "true";
                document.getElementById("chkHCenter").checked = localStorage.getItem("fmt_chkHCenter") === "true";
                document.getElementById("chkVCenter").checked = localStorage.getItem("fmt_chkVCenter") === "true";
                
                let scope = localStorage.getItem("fmt_scope");
                if (scope === "all") {
                    document.getElementById("scopeAll").checked = true;
                } else {
                    document.getElementById("scopeSheet").checked = true;
                }
            }
        }

        function saveSettings() {
            localStorage.setItem("fmt_chkColor", document.getElementById("chkColor").checked);
            localStorage.setItem("fmt_chkWrap", document.getElementById("chkWrap").checked);
            localStorage.setItem("fmt_chkHCenter", document.getElementById("chkHCenter").checked);
            localStorage.setItem("fmt_chkVCenter", document.getElementById("chkVCenter").checked);
            localStorage.setItem("fmt_scope", document.getElementById("scopeAll").checked ? "all" : "sheet");
            
            alert("配置已成功保存！");
        }

        function executeFormat() {
            const app = wps.Application;
            
            const rmColor = document.getElementById("chkColor").checked;
            const wrapText = document.getElementById("chkWrap").checked;
            const hCenter = document.getElementById("chkHCenter").checked;
            const vCenter = document.getElementById("chkVCenter").checked;
            const scopeAll = document.getElementById("scopeAll").checked;

            const xlCenter = -4108; 

            try {
                let count = scopeAll ? app.Worksheets.Count : 1;

                for (let i = 1; i <= count; i++) {
                    let sheet = scopeAll ? app.Worksheets.Item(i) : app.ActiveSheet;
                    let rng = sheet.UsedRange; 
                    
                    if (!rng) continue;

                    if (rmColor) rng.Interior.ColorIndex = 0; 
                    if (wrapText) rng.WrapText = true;        
                    if (hCenter) rng.HorizontalAlignment = xlCenter; 
                    if (vCenter) rng.VerticalAlignment = xlCenter;   
                }
                alert(scopeAll ? "整个工作簿清洗完毕！" : "当前表清洗完毕！");
            } catch(e) {
                alert("执行出错，错误代码：" + e.message);
            }
        }
    </script>
</body>
</html>
