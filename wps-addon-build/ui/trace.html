<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>录入计算公式</title>
    <style>
        body {
            font-family: "Microsoft YaHei";
            margin: 0;
            padding: 10px;
            background-color: #f5f5f5;
            color: #333;
            font-size: 12px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 8px 10px;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-bottom: 8px;
            position: relative;
        }

        select {
            padding: 2px 4px;
            font-size: 12px;
            outline: none;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            margin: 0;
            cursor: pointer;
        }

        .link {
            color: #007bff;
            text-decoration: none;
            cursor: pointer;
        }

        .link:hover {
            text-decoration: underline;
        }

        .color-picker-wrapper {
            position: relative;
            display: inline-block;
        }

        .color-block {
            width: 16px;
            height: 16px;
            border: 1px solid #999;
            cursor: pointer;
            border-radius: 2px;
            box-shadow: inset 0 0 1px rgba(0, 0, 0, 0.2);
        }

        .color-block:hover {
            border-color: #000;
        }

        .palette-popup {
            display: none;
            position: absolute;
            top: 24px;
            left: 0;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            padding: 10px;
            z-index: 100;
            width: 170px;
            border-radius: 4px;
            /* 🚨 核心魔法：禁止鼠标拖拽选中文字，彻底消除网页廉价感！ */
            user-select: none;
            -webkit-user-select: none;
        }

        .palette-title {
            font-size: 11px;
            color: #666;
            margin-bottom: 6px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(10, 14px);
            gap: 2px;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .color-cell {
            width: 14px;
            height: 14px;
            border: 1px solid transparent;
            cursor: pointer;
            box-sizing: border-box;
        }

        .color-cell:hover {
            border: 1px solid #000;
            transform: scale(1.1);
            transition: all 0.1s;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px;
            font-size: 11px;
            color: #333;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .action-btn:hover {
            background: #f0f0f0;
            border: 1px solid #ccc;
        }

        textarea {
            width: 100%;
            height: 100px;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            font-family: Consolas, monospace;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #007bff;
            box-shadow: 0 0 3px rgba(0, 123, 255, 0.3);
        }
    </style>
</head>

<body>

    <div class="toolbar">
        <label>备注栏:
            <select id="remarkMode">
                <option value="space">空格键</option>
                <option value="bracket">括号</option>
            </select>
        </label>

        <label>录入:
            <select id="enterMode">
                <option value="enter">ENTER</option>
                <option value="click">点击</option>
            </select>
        </label>

        <div class="color-picker-wrapper">
            <div id="currentColor" class="color-block" onclick="togglePalette()" title="选择填充颜色"></div>

            <div id="colorPalette" class="palette-popup">
                <div class="palette-title">主题颜色</div>
                <div id="themeColors" class="color-grid"></div>

                <div class="palette-title" style="margin-top: 4px;">标准色</div>
                <div id="standardColors" class="color-grid"></div>

                <hr style="border: none; border-top: 1px solid #eee; margin: 6px 0;">

                <div class="action-btn" onclick="selectColor('none')">
                    <span
                        style="color: red; font-weight: bold; border: 1px solid #ccc; width:12px; height:12px; display:inline-flex; align-items:center; justify-content:center; background:#fff;">×</span>
                    无填充颜色
                </div>

                <div class="action-btn" onclick="openNativePicker()">
                    <span
                        style="width:12px; height:12px; display:inline-block; background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red); border-radius: 50%; border:1px solid #ccc;"></span>
                    其他颜色(M)...
                </div>
            </div>

            <input type="color" id="nativeColorPicker" style="display: none;">
        </div>

        <label><input type="checkbox" id="chkTop"> 置顶</label>
        <a href="#" class="link">教程</a>
    </div>

    <textarea id="formulaInput" placeholder="在这里输入公式..."></textarea>

    <script>
        const themeHex = ['#ffffff', '#000000', '#e7e6e6', '#44546a', '#5b9bd5', '#ed7d31', '#a5a5a5', '#ffc000', '#4472c4', '#70ad47'];
        const standardHex = ['#c00000', '#ff0000', '#ffc000', '#ffff00', '#92d050', '#00b050', '#00b0f0', '#0070c0', '#002060', '#7030a0'];
        const defaultColor = '#00b0f0';

        window.onload = function () {
            initColorPalette();
            let savedColor = localStorage.getItem("calc_fill_color");
            applyColorToBlock(savedColor ? savedColor : defaultColor);

            document.getElementById('nativeColorPicker').addEventListener('input', function (e) {
                selectColor(e.target.value);
            });
        };

        function initColorPalette() {
            let themeDiv = document.getElementById('themeColors');
            let standardDiv = document.getElementById('standardColors');

            themeHex.forEach(color => {
                themeDiv.innerHTML += `<div class="color-cell" style="background-color:${color}" onclick="selectColor('${color}')" title="${color}"></div>`;
            });
            standardHex.forEach(color => {
                standardDiv.innerHTML += `<div class="color-cell" style="background-color:${color}" onclick="selectColor('${color}')" title="${color}"></div>`;
            });
        }

        function togglePalette() {
            let p = document.getElementById('colorPalette');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function hidePalette() {
            document.getElementById('colorPalette').style.display = 'none';
        }

        // 🚨 核心魔法：监听全局点击事件，实现“点击空白处自动收起色板”
        document.addEventListener('click', function (event) {
            let wrapper = document.querySelector('.color-picker-wrapper');
            let palette = document.getElementById('colorPalette');
            // 如果点的地方既不是色板内部，也不是那个方块按钮，就把它收起来！
            if (wrapper && !wrapper.contains(event.target)) {
                palette.style.display = 'none';
            }
        });

        function openNativePicker() {
            document.getElementById('nativeColorPicker').click();
        }

        function selectColor(colorHex) {
            applyColorToBlock(colorHex);
            localStorage.setItem("calc_fill_color", colorHex);
            hidePalette();
        }

        function applyColorToBlock(colorHex) {
            let block = document.getElementById('currentColor');
            if (colorHex === 'none') {
                block.style.background = 'url("data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 10 10\'><line x1=\'0\' y1=\'10\' x2=\'10\' y2=\'0\' stroke=\'red\' stroke-width=\'1.5\'/></svg>") white';
            } else {
                block.style.background = colorHex;
            }
        }

        document.getElementById("formulaInput").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                let text = this.value;
                if (!text) return;

                let currentColor = localStorage.getItem("calc_fill_color") || defaultColor;
                const app = wps.Application;

                if (app.ActiveCell) {
                    try {
                        app.ActiveCell.Value2 = text;
                        if (currentColor === 'none') {
                            app.ActiveCell.Interior.ColorIndex = 0;
                        } else {
                            app.ActiveCell.Interior.Color = hexToBgr(currentColor);
                        }
                    } catch (err) {
                        console.log("写入报错", err);
                    }
                }
                this.value = "";
            }
        });

        function hexToBgr(hex) {
            hex = hex.replace('#', '');
            let r = parseInt(hex.substring(0, 2), 16);
            let g = parseInt(hex.substring(2, 4), 16);
            let b = parseInt(hex.substring(4, 6), 16);
            return r + (g * 256) + (b * 65536);
        }
    </script>
</body>

</html>
